name: Deploy FastAPI RAG Service to ECR

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    name: Build and Push to ECR
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: microservice-python-nodejs # Change to your actual repo name
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy-ec2:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: 982081080823.dkr.ecr.ap-southeast-1.amazonaws.com
          AWS_REGION: ap-southeast-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,AWS_REGION,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,GEMINI_API_KEY
          command_timeout: 60m
          script: |
            set -e
            set -o pipefail
            
            cd ~/ragpractice
            
            echo "Disk Space Before Cleanup:"
            df -h
            
            echo "Syncing Environment Variables..."
            # Update Gemini API Key
            if [ ! -z "$GEMINI_API_KEY" ]; then
                sed -i '/^GEMINI_API_KEY=/d' .env || true
                echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
            fi
            
            echo "Pre-deployment Cleanup..."
            sudo docker image prune -a -f || true
            sudo docker system prune -f --volumes || true
            
            echo "Disk Space After Cleanup:"
            df -h
            
            echo "Logging in to ECR..."
            AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
            AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
            aws ecr get-login-password --region $AWS_REGION | sudo docker login --username AWS --password-stdin $ECR_REGISTRY
            
            echo "Updating Python Image Tag..."
            # Remove old tag if it exists and write the new one
            sed -i '/^PYTHON_IMAGE_TAG=/d' .env || true
            echo "PYTHON_IMAGE_TAG=${{ github.sha }}" >> .env
            
            echo "Pulling new FastAPI image..."
            if sudo docker compose version > /dev/null 2>&1; then
                sudo docker compose pull fastapi
                sudo docker compose up -d --no-deps fastapi
            else
                sudo docker-compose pull fastapi
                sudo docker-compose up -d --no-deps fastapi
            fi
            
            echo "Post-deployment Cleanup..."
            sudo docker image prune -a -f
            
            echo "Final Disk Space Status:"
            df -h
            
            echo "FastAPI deployment successful 🚀"
