name: Deploy FastAPI RAG Service to ECR

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    name: Build and Push to ECR
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: microservice-python-nodejs # Change to your actual repo name
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy-ec2:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            set -o pipefail
            
            cd ~/ragpractice
            
            # Export variables
            export ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
            
            echo "Logging in to ECR..."
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | sudo docker login --username AWS --password-stdin $ECR_REGISTRY
            
            echo "Updating Python Image Tag..."
            # Remove old tag if it exists and write the new one
            sed -i '/^PYTHON_IMAGE_TAG=/d' .env || true
            echo "PYTHON_IMAGE_TAG=${{ github.sha }}" >> .env
            
            echo "Pulling new FastAPI image..."
            if sudo docker compose version > /dev/null 2>&1; then
                sudo -E docker compose pull fastapi
                sudo -E docker compose up -d --no-deps fastapi
            else
                sudo -E docker-compose pull fastapi
                sudo -E docker-compose up -d --no-deps fastapi
            fi
            
            echo "Cleanup..."
            sudo docker image prune -a -f
            
            echo "FastAPI deployment successful 🚀"
